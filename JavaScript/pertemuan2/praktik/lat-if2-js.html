<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF KONDISI 2</title>
</head>
<body>
    <script>
        let nama = "Wahyu";
        let totalBelanja = 10000;
        let keterangan = "";

        // jika total belanja pelanggan > 5000, maka "Selamat Wahyu, Anda mendapatkan hadiah,"
        // selain itu "TerimaKasih Wahyu sudah berbelanja"

        if (totalBelanja > 5000) {
            keterangan = "Selamat " + nama +", Anda mendapatkan hadiah";
        } else {
            keterangan = "Terimakasih " + nama + " Sudah Berbelanja"
        }
        document.write(keterangan);
    </script>
</body>
</html>
