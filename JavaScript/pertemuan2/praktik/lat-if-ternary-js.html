<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF TERNARY</title>
</head>
<body>
    <script>
        // ternary atau 2 kondisi dalam satu waktu dan untuk menentukan kondisi tersebut
        // tergantung variabel kunci

        let siswa = "Kheril Irli";
        let nilai = 90;
        let ket = (nilai >= 60) ? "Lulus" : "Gagal";
        document.write("<br>Siswa bernama " + siswa + " Dengan Nilai " + nilai +
            " dinyatakan " + ket
        );
    </script>
</body>
