<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelian Barang - Switch Case</title>
</head>
<body>
    <script>
        // ada pelanggan membeli barang elektronik
        // barang: tv=>3jt, motor=>12jt, kulkas=>4jt
        // tentukan pembelian barangnya dan berapa barang yang dibeli
        // tambahkan proses diskon dari setiap barang
        // lalu cetak hasil pembelian barang dan totalnya

        let pembeli = "Kheril";
        let barang = "Motor";
        let harga_satuan = 0;

        switch(barang){
            case "TV": harga_satuan = 3000000; break;
            case "Motor": harga_satuan = 12000000; break;
            case "Kulksa": harga_satuan = 4000000; break;
            default: harga_satuan = 0;
        }

        //deklarasi variable proses
        let jml_beli = 10;
        let bruto = harga_satuan * jml_beli;
        let ppn = bruto * 0.11;

        //membuat minimal diskon dari pembelian produk diatas
        let diskon = 0;
        if (barang == "TV") diskon = 0.3 * bruto;
        else if (barang == "Motor") diskon = 0.2 * bruto;
        else diskon = 0.05 *bruto;
        let hasil_diskon = bruto - diskon

        //cetak
        document.write("<h1>Data Pembelian</h1>");
        document.write(
            "<br>Pembeli: " + pembeli +
            "<br>Barang: " + barang +
            "<br>Jumlah Beli Barang: " + jml_beli +
            "<br>Harga Satuan: " + harga_satuan +
            "<br>Total Harga: " + bruto +
            "<br>Diskon: " + diskon +
            "<br>PPN: " + ppn +
            "<br>Total Harga di potong diskon: " + hasil_diskon
        );
    </script>
</body>
</html>
