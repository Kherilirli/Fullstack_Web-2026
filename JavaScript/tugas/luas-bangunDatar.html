<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luas Bangun Datar</title>
</head>
<body>
    <script>
        //Luas Persegi Panjang
        //Rumus: p (panjang) * l (lebar)
        let panjang = 10; 
        let lebar = 5; 
        let luasPersegiPanjang = panjang * lebar;
        
        document.write("<h2>Luas Persegi Panjang</h2><br>");
        document.write("Panjang: " + panjang + "<br>");
        document.write("Lebar: " + lebar + "<br>");
        document.write("Luas: " + luasPersegiPanjang);
        document.write("<hr>");

        //Luas Bujur Sangkar
        //Rumus: Sisi * Sisi
        let sisi = 6;
        let luasBujurSangkar = sisi * sisi;

        document.write("<h2>Luas Bujur Sangkar</h2><br>");
        document.write("Sisi: " + sisi + "<br>");
        document.write("Luas: " + luasBujurSangkar);
        document.write("<hr>");

        //Luas Segitiga
        //Rumus: 0.5 * a (alas) * t (tinggi)
        let alas = 10
        let tinggi = 7
        let luasSegitiga = 0.5 * alas * tinggi;

        document.write("<h2>Luas Segitiga</h2><br>");
        document.write("Alas: " + alas + "<br>");
        document.write("Tinggi: " + tinggi + "<br>");
        document.write("Luas: " + luasSegitiga);
        document.write("<hr>");        
    </script>
</body>
</html>
