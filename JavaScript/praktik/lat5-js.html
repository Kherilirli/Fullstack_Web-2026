<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Aritmatika</title>
</head>
<body>
    <script>
        let a = 10;
        let b = 5;

        //penjumlahan
        document.write(a + b + "<br>");
        //pengurangan
        document.write(a - b + "<br>");
        //perkalian
        document.write(a * b + "<br>");
        //pembagian
        document.write(a / b + "<br>");
        //modulus
        document.write(a % b + "<br>");
        //increment
        ++a;
        document.write(a + "<br>");
        //decrement
        b--;
        document.write(b + "<br>");
    </script>
</body>
</html>
