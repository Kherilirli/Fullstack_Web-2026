<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengelola DOM Attribute</title>

    <style>
        #container{
            width: 300px;
            height: 300px;
            display: block;
            align-items: center;
            justify-content: center;
            border: 2px solid #ccc;

        }
        img {
            max-width: 100%;
            max-height: 100%;
        }
        .backgroun-color {
            background-color: blueviolet;
        }

</head>
<body>
    <div id="container" class="background-color">
        <img id="gambar" src="img/gambar1.jpeg" alt="Gambar Default" style="display: none;">
    </div>

    <button onclick="tambahGambar()">Tambah Gambar</button>

    <script src="script.js"></script>

</html>
