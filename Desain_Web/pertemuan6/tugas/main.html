        <div class="row g-0">
            <div class="col-12">
                <nav class="navbar navbar-expand-lg navbar-dark">
                    <div class="container">

                    <div class="d-flex justify-content-start align-items-center">
                        <a class="navbar-brand fw-bold text-danger" href="home.html">
                        <img src="img/logo-NF-Academy-02_single.png" width="60" class="me-2">
                        </a>
                    </div>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>

                    <div class="collapse navbar-collapse">
                        <ul class="navbar-nav mx-auto">

                    </div>

    </div>
    <div class="container-fluid px-3">
        <div class="row g-3">
            <div class="col-lg-3 col-md-4 mb-4">
                <div class="content-box p-4">
                    <h4 class="section-title">Website Eksternal</h4>
                    <a href="https://nfacademy.id" target="_blank" class="side-link">NF Academy</a>

                    <a href="https://github.com" target="_blank" class="side-link">Github</a>

                    <a href="https://w3schools.com" target="_blank" class="side-link">W3Schools</a>

    <footer class="footer text-center p-2">
        <p>&copy; 2026 Kheril Irli Januar | Tugas 6 RWD Bootstrap</p>
        <div class="social-icons">
            <i class="bi bi-instagram"></i>
            <i class="bi bi-github"></i>

        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        function loadPage(page) {
            fetch(page)
                .then(response => response.text())
                .then(data => {
                    document.getElementById("mainContent").innerHTML = data;
                });
        }

        document.querySelectorAll(".nav-link").forEach(link => {
            link.addEventListener("click", function(e) {
                e.preventDefault();
                loadPage(this.getAttribute("href"));
            });
        });

        loadPage("home.html");
    </script>
